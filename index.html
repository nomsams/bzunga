    },

    render: (state) => {
        App.gameState = state;
        
        if (state.phase === 'lobby') {
            let list = document.getElementById('lobby-players');
            list.innerHTML = '';
            state.players.forEach(p => {
                let item = document.createElement('div');
                item.className = 'player-item';
                let status = !p.connected && !p.isBot ? '<span style="color:var(--danger)">(Disconnected)</span>' : '';
                item.innerHTML = `<strong>${p.name}</strong> <span style="color:#94a3b8;">${p.isHost ? '👑 Host' : p.isBot ? '🤖 Bot' : '👤 Player'} ${status}</span>`;
                list.appendChild(item);
            });
            return;
        }

        if (state.phase !== 'peek') App.uiState.hasPeeked.clear();

        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-view').classList.remove('hidden');

        document.getElementById('phase-display').innerText = state.phase.toUpperCase();
        if (state.phase === 'orbit') document.getElementById('phase-display').style.color = "var(--danger)";
        else document.getElementById('phase-display').style.color = "#94a3b8";

        let chatBox = document.getElementById('chat-messages');
        let wasAtBottom = chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 20;
        chatBox.innerHTML = '';
        
        if (state.logs.length > UI.lastLogCount) {
            let newLogs = state.logs.slice(UI.lastLogCount);
            newLogs.forEach(l => {
                if (l.type === 'sys') {
                    UI.showToast(l.msg, l.logType);
                } else {
                    UI.showChatBubble(l.name, l.msg, l.type === 'pirate');
                }
            });
            UI.lastLogCount = state.logs.length;
        }

        state.logs.forEach(l => {
            let d = document.createElement('div');
            if (l.type === 'sys') { d.className = 'msg-sys'; d.innerText = l.msg; }
            else if (l.type === 'pirate') { d.className = 'msg-pirate'; d.innerHTML = `<strong>${l.name}:</strong> ${l.msg}`; }
            else { d.className = 'msg-chat'; d.innerHTML = `<strong>${l.name}:</strong> ${l.msg}`; }
            chatBox.appendChild(d);
        });
        if (wasAtBottom) chatBox.scrollTop = chatBox.scrollHeight;

        if (state.lastSlap && state.lastSlap.time !== UI.lastSlapTime) {
            UI.lastSlapTime = state.lastSlap.time;
            let targetEl = document.getElementById(state.lastSlap.id);
            if (targetEl) {
                let rect = targetEl.getBoundingClientRect();
                let vfx = document.createElement('div');
                vfx.className = `vfx-slap ${state.lastSlap.success ? '' : 'miss'}`;
                vfx.innerText = state.lastSlap.success ? "SLAP!" : "MISS!";
                vfx.style.left = `${rect.left + rect.width/2}px`;
                vfx.style.top = `${rect.top + rect.height/2}px`;
                document.body.appendChild(vfx);
                setTimeout(() => vfx.remove(), 600);
            }
            
            setTimeout(() => {
                if (App.gameState) UI.render(App.gameState);
            }, 2500);
        }

        let cx = window.innerWidth / 2;
        let cy = window.innerHeight / 2;
        
        if (window.innerWidth <= 768) cy -= 45; 

        let rx = Math.min(window.innerWidth * 0.35, window.innerWidth / 2 - 80); 
        let ry = Math.min(window.innerHeight * 0.38, window.innerHeight / 2 - 90);

        let localPlayerIndex = state.players.findIndex(p => p.id === App.localId);
        if (localPlayerIndex === -1) localPlayerIndex = 0; 

        document.querySelectorAll('.player-badge').forEach(e => e.remove());

        state.players.forEach((p, i) => {
            let relIndex = (i - localPlayerIndex + state.players.length) % state.players.length;
            let angle = (Math.PI / 2) + (relIndex * (2 * Math.PI / state.players.length));
            
            let px = cx + Math.cos(angle) * rx;
            let py = cy + Math.sin(angle) * ry;

            let isBottomHalf = py > cy;
            let yDirToCenter = isBottomHalf ? -1 : 1; 

            let badgePx = cx + Math.cos(angle) * (rx + 60);
            let badgePy = cy + Math.sin(angle) * (ry + 80);

            let badge = document.createElement('div');
            let isExpanded = state.phase === 'peek' ? 'expanded' : '';
            
            badge.className = `player-badge ${isExpanded} ${i === state.turnIndex ? 'active-turn' : ''} ${state.bazungaCallerId === p.id ? 'bazunga' : ''} ${!p.connected && !p.isBot ? 'disconnected' : ''}`;
            
            badge.style.left = `${badgePx}px`;
            badge.style.top = `${badgePy}px`;
            
            let icon = p.isBot ? '🤖' : '👤';
            let cardCount = p.hand.length + p.penaltyCards.length;
            let turnIndicator = i === state.turnIndex ? `<div class="turn-text">CURRENT TURN</div>` : '';
            
            badge.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; width:100%;">
                    <span class="icon">${icon}</span>
                    <span class="name-text">${p.name}</span>
                </div>
                <span class="meta">${cardCount} Cards</span>
                ${turnIndicator}
            `;
            document.getElementById('ui-layer').appendChild(badge);

            let allCards = [...p.hand, ...p.penaltyCards];
            
            let maxCols = 2; 
            let handW = window.innerWidth <= 768 ? 48 : 56; 
            let handH = window.innerWidth <= 768 ? 66 : 78; 
            
            if (allCards.length > 4) {
                maxCols = Math.ceil(Math.sqrt(allCards.length)); 
                handW = 35; 
                handH = 45;
            }
            
            allCards.forEach((c, idx) => {
                let el = document.getElementById(c.id) || UI.createCardDOM(c);
                if (!App.animEnabled) el.classList.add('no-anim'); else el.classList.remove('no-anim');
                
                let row = Math.floor(idx / maxCols);
                let col = idx % maxCols;
                let cardsInRow = Math.min(maxCols, allCards.length - row * maxCols);
                
                let ox = (col * handW) - ((cardsInRow - 1) * handW / 2);
                let oy = (row - 0.5) * handH * -yDirToCenter; 
                
                el.style.left = `${px + ox - (handW * 0.5)}px`; 
                el.style.top = `${py + oy - (handH * 0.5)}px`;
                el.style.zIndex = 20 + idx; 

                let isFaceUp = false;
                if (state.phase === 'game_over') {
                    isFaceUp = true;
                } else if (App.uiState.peekedCards.has(c.id)) {
                    isFaceUp = true;
                } else if (state.lastSlap && state.lastSlap.id === c.id && !state.lastSlap.success && (Utils.timestamp() - state.lastSlap.time < 2500)) {
                    isFaceUp = true;
                }
                
                let inner = el.querySelector('.card-inner');
                if (!isFaceUp) inner.classList.add('is-flipped');
                else inner.classList.remove('is-flipped');

                if (!p.connected && !p.isBot) el.classList.add('disconnected');
                else el.classList.remove('disconnected');

                el.classList.remove('targetable', 'selected-target', 'holding-card', 'highlight-recent');
                
                if (state.lastActionTargetId === c.id) el.classList.add('highlight-recent');

                let mode = App.uiState.targetingMode;
                if (mode) {
                    if (mode === 'swap' && p.id === App.localId) el.classList.add('targetable');
                    else if (mode === 'peek_self' && p.id === App.localId) el.classList.add('targetable');
                    else if (mode === 'peek_opp' && p.id !== App.localId) el.classList.add('targetable');
                    else if (mode === 'q_peek_or_swap') {
                        el.classList.add('targetable'); 
                        if (c.id === App.uiState.selectedCardId) el.classList.add('selected-target');
                    }
                    else if (mode === 'blind_swap_1') el.classList.add('targetable');
                    else if (mode === 'blind_swap_2') {
                        el.classList.add('targetable');
                        if (c.id === App.uiState.selectedCardId) el.classList.add('selected-target');
                    }
                    else if (mode === 'force_penalty' && p.id !== App.localId) el.classList.add('targetable');
                }
            });
        });

        let deckOffsetY = ry * 0.45; 
        let cWidthScale = window.innerWidth <= 768 ? 22 : 26;

        // Deck
        state.deck.forEach((c, i) => {
            let el = document.getElementById(c.id) || UI.createCardDOM(c);
            if (!App.animEnabled) el.classList.add('no-anim'); else el.classList.remove('no-anim');
            el.style.left = `${cx - 45 - cWidthScale}px`;
            el.style.top = `${cy - deckOffsetY - (i*0.5)}px`; 
            el.style.zIndex = i;
            el.querySelector('.card-inner').classList.add('is-flipped');
            el.classList.remove('targetable', 'selected-target', 'holding-card', 'highlight-recent');
            
            let isMyTurn = state.players[state.turnIndex]?.id === App.localId;
            if (isMyTurn && !state.activeAbility && !App.uiState.targetingMode) {
                el.classList.add('deck-glow');
            } else {
                el.classList.remove('deck-glow');
            }
        });

        // Discard
        state.discardPile.forEach((c, i) => {
            let el = document.getElementById(c.id) || UI.createCardDOM(c);
            if (!App.animEnabled) el.classList.add('no-anim'); else el.classList.remove('no-anim');
            el.style.left = `${cx + 45 - cWidthScale}px`;
            el.style.top = `${cy - deckOffsetY}px`;
            el.style.zIndex = 100 + i; 
            el.querySelector('.card-inner').classList.remove('is-flipped');
            el.classList.remove('targetable', 'selected-target', 'deck-glow', 'holding-card', 'highlight-recent');
            if (!el.dataset.rot) el.dataset.rot = (Math.random() * 20 - 10);
            el.style.transform = `rotate(${el.dataset.rot}deg)`;
            
            if (state.lastActionTargetId === c.id) el.classList.add('highlight-recent');

            let isMyTurn = state.players[state.turnIndex]?.id === App.localId;
            if (isMyTurn && !state.activeAbility && !App.uiState.targetingMode) {
                el.classList.add('deck-glow');
            }
        });

        // Holding Area
        if (state.activeAbility && state.activeAbility.card) {
            let c = state.activeAbility.card;
            let el = document.getElementById(c.id) || UI.createCardDOM(c);
            
            let activePIdx = state.players.findIndex(p => p.id === state.activeAbility.player);
            let relIndex = (activePIdx - localPlayerIndex + state.players.length) % state.players.length;
            let angle = (Math.PI / 2) + (relIndex * (2 * Math.PI / state.players.length));
            
            let px, py;
            if (state.activeAbility.player === App.localId) {
                px = cx; 
                py = cy + ry * 0.35; 
            } else {
                px = cx + Math.cos(angle) * (rx * 0.4); 
                py = cy + Math.sin(angle) * (ry * 0.4);
            }
            
            el.style.left = `${px - cWidthScale}px`;
            el.style.top = `${py - 37}px`;
            el.style.zIndex = 1000;
            
            let isFaceUp = (state.activeAbility.player === App.localId || state.activeAbility.step > 0);
            let inner = el.querySelector('.card-inner');
            if (!isFaceUp) inner.classList.add('is-flipped');
            else inner.classList.remove('is-flipped');
            
            el.classList.add('holding-card');
            el.classList.remove('highlight-recent');
        }

        UI.updateControls(state);

        if (state.phase === 'game_over' && !App.uiState.showingResults) {
            App.uiState.showingResults = true;
            UI.showToast("Game Over! Calculating scores...", "info");
            
            setTimeout(() => {
                document.getElementById('modal-gameover').classList.remove('hidden');
                document.getElementById('modal-overlay').classList.remove('hidden');
                document.getElementById('gameover-winner').innerText = state.winners.length > 1 ? "Winners: " + state.winners.join(', ') : "Winner: " + state.winners[0];
                
                let html = ``;
                let sortedPlayers = [...state.players].sort((a,b) => a.score - b.score);
                sortedPlayers.forEach(p => {
                    let isWinner = state.winners.includes(p.name);
                    let pCards = [...p.hand, ...p.penaltyCards];
                    let mathStr = pCards.map(c => UI.getCardScoreString(c)).join(' + ') + ` = <strong>${p.score}</strong>`;
                    let cardsHtml = pCards.map(c => `<div class="mini-card ${c.isRed ? 'red' : 'black'}">${c.value}${c.suit}</div>`).join('');
                    
                    html += `
                    <div class="endgame-player ${isWinner ? 'winner' : ''}">
                        <div class="endgame-header">
                            <span class="endgame-name">${p.name} ${isWinner ? '👑' : ''} ${state.bazungaCallerId === p.id ? '(Bazunga Caller)' : ''}</span>
                            <span class="endgame-score">${p.score} pts</span>
                        </div>
                        <div class="endgame-cards">${cardsHtml}</div>
                        <div class="endgame-math">${mathStr}</div>
                    </div>`;
                });
                document.getElementById('gameover-results').innerHTML = html;
            }, 4000); 
        }
    },

    updateControls: (state) => {
        let actionBar = document.getElementById('action-bar');
        let statusText = document.getElementById('status-text');
        actionBar.innerHTML = '';
        actionBar.classList.add('hidden');

        let isMyTurn = state.players[state.turnIndex]?.id === App.localId;
        let me = state.players.find(p => p.id === App.localId);
        let activePlayer = state.players[state.turnIndex];

        if (state.phase === 'peek') {
            if (me && !me.ready) statusText.innerText = "Tap your BOTTOM TWO cards to peek. Then click Ready.";
            else statusText.innerText = "Waiting for others to finish peeking...";
        } else if (state.phase === 'play' || state.phase === 'orbit') {
            if (isMyTurn) {
                if (App.uiState.targetingMode === 'swap') statusText.innerText = "Select a card in your layout to swap out.";
                else if (App.uiState.targetingMode === 'peek_self') statusText.innerText = "Select one of your cards to peek at (9 Magic).";
                else if (App.uiState.targetingMode === 'peek_opp') statusText.innerText = "Select an opponent's card to peek at (10 Magic).";
                
                else if (App.uiState.targetingMode === 'q_peek_or_swap') {
                    if (!App.uiState.selectedCardId) statusText.innerText = "Queen Magic: Click ANY card to PEEK at it.";
                    else statusText.innerText = "Queen Magic: Click a DIFFERENT card to SWAP, or the SAME card to finish.";
                }
                else if (App.uiState.targetingMode === 'peeking') statusText.innerText = "Memorize this card...";
                
                else if (App.uiState.targetingMode === 'blind_swap_1') statusText.innerText = "Select the FIRST card to blind swap (Jack Magic).";
                else if (App.uiState.targetingMode === 'blind_swap_2') statusText.innerText = "Select the SECOND card to blind swap.";
                else if (App.uiState.targetingMode === 'force_penalty') statusText.innerText = "Select an opponent's card to penalize them (Red King).";
                else if (state.activeAbility) statusText.innerText = "Play or Swap your drawn card.";
                else statusText.innerText = "Your Turn: Draw a card or Slap!";
            } else {
                statusText.innerText = `Waiting for ${activePlayer ? activePlayer.name : '...'} to play.`;
            }
        }

        if (state.phase === 'game_over') {
            actionBar.classList.remove('hidden');
            let btn = document.createElement('button');
            btn.innerText = "Show Results";
            btn.className = "primary";
            btn.onclick = () => {
                document.getElementById('modal-gameover').classList.remove('hidden');
                document.getElementById('modal-overlay').classList.remove('hidden');
            };
            actionBar.appendChild(btn);
            return;
        }

        if (state.phase === 'peek' && me && !me.ready) {
            actionBar.classList.remove('hidden');
            let btn = document.createElement('button');
            btn.innerText = "Ready (Finished Peeking)";
            btn.className = "primary";
            btn.onclick = () => { App.uiState.peekedCards.clear(); Net.sendAction({ type: 'READY_PEEK' }); };
            actionBar.appendChild(btn);
            return;
        }

        if (state.phase === 'play' || state.phase === 'orbit') {
            if (isMyTurn && !state.activeAbility) {
                actionBar.classList.remove('hidden');
                
                let btnDeck = document.createElement('button');
                btnDeck.innerText = "Draw Deck";
                btnDeck.className = "primary";
                btnDeck.onclick = () => Net.sendAction({ type: 'DRAW_DECK' });
                actionBar.appendChild(btnDeck);

                if (state.discardPile.length > 0) {
                    let btnDisc = document.createElement('button');
                    btnDisc.innerText = "Draw Discard";
                    btnDisc.className = "secondary";
                    btnDisc.onclick = () => Net.sendAction({ type: 'DRAW_DISCARD' });
                    actionBar.appendChild(btnDisc);
                }

                if (state.phase === 'play') {
                    let btnBaz = document.createElement('button');
                    btnBaz.innerText = "Call BAZUNGA";
                    btnBaz.className = "danger";
                    btnBaz.onclick = () => { 
                        if(confirm("Are you sure you want to call BAZUNGA? This triggers the final orbit!")) {
                            Net.sendAction({ type: 'CALL_BAZUNGA' });
                        }
                    };
                    actionBar.appendChild(btnBaz);
                }
            }

            if (state.activeAbility && state.activeAbility.player === App.localId) {
                actionBar.classList.remove('hidden');
                let ab = state.activeAbility;

                if (ab.type.startsWith('holding')) {
                    let btnPlay = document.createElement('button');
                    btnPlay.innerText = MAGIC_VALUES.includes(ab.card.value) && ab.type === 'holding' ? "Play Magic" : "Discard";
                    btnPlay.className = "primary";
                    btnPlay.onclick = () => Net.sendAction({ type: 'PLAY_HOLDING', action: 'discard' });
                    actionBar.appendChild(btnPlay);

                    let btnSwap = document.createElement('button');
                    btnSwap.innerText = "Swap with Layout";
                    btnSwap.className = "secondary";
                    btnSwap.onclick = () => { 
                        App.uiState.targetingMode = 'swap'; 
                        UI.render(state); 
                    };
                    actionBar.appendChild(btnSwap);

                    if (me.hand.length + me.penaltyCards.length === 0) {
                        let btnAdd = document.createElement('button');
                        btnAdd.innerText = "Place in Empty Layout";
                        btnAdd.className = "secondary";
                        btnAdd.onclick = () => Net.sendAction({ type: 'PLAY_HOLDING', action: 'add_to_layout' });
                        actionBar.appendChild(btnAdd);
                    }

                } else if (ab.step === 1 && !App.uiState.targetingMode) {
                    let mType = ab.type;
                    if (mType === 'magic_9') App.uiState.targetingMode = 'peek_self';
                    else if (mType === 'magic_10') App.uiState.targetingMode = 'peek_opp';
                    else if (mType === 'magic_J') App.uiState.targetingMode = 'blind_swap_1';
                    else if (mType === 'magic_Q') App.uiState.targetingMode = 'q_peek_or_swap'; 
                    else if (mType === 'magic_K') App.uiState.targetingMode = 'force_penalty';
                    
                    setTimeout(() => UI.render(state), 0);
                }

                if (App.uiState.targetingMode === 'q_peek_or_swap' && App.uiState.selectedCardId) {
                    let btnPass = document.createElement('button');
                    btnPass.innerText = "Pass (Don't Swap)";
                    btnPass.className = "secondary";
                    btnPass.onclick = () => { 
                        App.uiState.targetingMode = null; 
                        App.uiState.selectedCardId = null;
                        App.uiState.peekedCards.clear(); 
                        Net.sendAction({ type: 'RESOLVE_MAGIC' }); 
                    };
                    actionBar.appendChild(btnPass);
                } else if (App.uiState.targetingMode && App.uiState.targetingMode !== 'peeking') {
                    let btnCancel = document.createElement('button');
                    btnCancel.innerText = "Cancel Action";
                    btnCancel.className = "danger";
                    btnCancel.onclick = () => {
                        App.uiState.targetingMode = null;
                        App.uiState.selectedCardId = null;
                        App.uiState.peekedCards.clear();
                        if (ab.step === 1) Net.sendAction({ type: 'RESOLVE_MAGIC' }); 
                        else UI.render(state); 
                    };
                    actionBar.appendChild(btnCancel);
                }
            }
        }
    },

    handleCardClick: (e) => {
        let cardEl = e.target.closest('.card');
        if (!cardEl) return;
        let cardId = cardEl.id;
        let state = App.gameState;
        if (!state) return;

        let now = Utils.timestamp();
        App.lastClickedCardId = cardId;
        App.lastClickTime = now;

        let clickedCard = Engine.getCardById(cardId);
        if (!clickedCard) return;

        let isMyTurn = state.players[state.turnIndex]?.id === App.localId;
        let isHolding = state.activeAbility && state.activeAbility.player === App.localId && state.activeAbility.type.startsWith('holding');

        // 1. TARGETING LOGIC (Highest Priority if active)
        if (App.uiState.targetingMode) {
            let mode = App.uiState.targetingMode;
            
            if (mode === 'peeking') return; // Block clicks while peeking

            if (mode === 'swap' && clickedCard.ownerId === App.localId) {
                Net.sendAction({ type: 'PLAY_HOLDING', action: 'swap', targetId: cardId });
                App.uiState.targetingMode = null;
            } 
            else if (mode === 'peek_self' && clickedCard.ownerId === App.localId) {
                App.uiState.targetingMode = 'peeking';
                App.uiState.peekedCards.add(cardId);
                UI.render(state);
                setTimeout(() => { 
                    App.uiState.peekedCards.delete(cardId); 
                    App.uiState.targetingMode = null;
                    Net.sendAction({ type: 'RESOLVE_MAGIC', targetId: cardId }); 
                }, 2000);
            }
            else if (mode === 'peek_opp' && clickedCard.ownerId !== App.localId && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.targetingMode = 'peeking';
                App.uiState.peekedCards.add(cardId);
                UI.render(state);
                setTimeout(() => { 
                    App.uiState.peekedCards.delete(cardId); 
                    App.uiState.targetingMode = null;
                    Net.sendAction({ type: 'RESOLVE_MAGIC', targetPlayerId: clickedCard.ownerId, targetId: cardId }); 
                }, 2000);
            }
            else if (mode === 'q_peek_or_swap' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                if (!App.uiState.selectedCardId) {
                    App.uiState.selectedCardId = cardId;
                    App.uiState.peekedCards.add(cardId);
                    UI.render(state);
                } else {
                    if (cardId === App.uiState.selectedCardId) {
                        App.uiState.targetingMode = null;
                        App.uiState.selectedCardId = null;
                        App.uiState.peekedCards.clear();
                        Net.sendAction({ type: 'RESOLVE_MAGIC' });
                    } else {
                        Net.sendAction({ type: 'RESOLVE_MAGIC', swapTarget1: App.uiState.selectedCardId, swapTarget2: cardId });
                        App.uiState.targetingMode = null;
                        App.uiState.selectedCardId = null;
                        App.uiState.peekedCards.clear();
                    }
                }
            }
            else if (mode === 'blind_swap_1' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.selectedCardId = cardId;
                App.uiState.targetingMode = 'blind_swap_2';
                UI.render(state);
            }
            else if (mode === 'blind_swap_2' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                if (cardId === App.uiState.selectedCardId) return; 
                Net.sendAction({ type: 'RESOLVE_MAGIC', swapTarget1: App.uiState.selectedCardId, swapTarget2: cardId });
                App.uiState.targetingMode = null;
                App.uiState.selectedCardId = null;
                App.uiState.peekedCards.clear(); 
            }
            else if (mode === 'force_penalty' && clickedCard.ownerId !== App.localId && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                Net.sendAction({ type: 'RESOLVE_MAGIC', targetPlayerId: clickedCard.ownerId });
                App.uiState.targetingMode = null;
            }
            return;
        }

        if (isHolding && clickedCard.ownerId === App.localId && (clickedCard.loc === 'hand' || clickedCard.loc === 'penalty')) {
            Net.sendAction({ type: 'PLAY_HOLDING', action: 'swap', targetId: cardId });
            return;
        }

        if (!isHolding && (state.phase === 'play' || state.phase === 'orbit') && (clickedCard.loc === 'hand' || clickedCard.loc === 'penalty')) {
            cardEl.style.zIndex = 999;
            Net.sendAction({ type: 'SLAP', targetId: cardId, timestamp: now });
            return;
        }

        if (isMyTurn && !state.activeAbility) {
            if (clickedCard.loc === 'deck') {
                Net.sendAction({ type: 'DRAW_DECK' });
                return;
            }
            if (clickedCard.loc === 'discard') {
                Net.sendAction({ type: 'DRAW_DISCARD' });
                return;
            }
        }

        if (state.phase === 'peek' && clickedCard.ownerId === App.localId) {
            if (!App.uiState.hasPeeked.has(cardId)) {
                if (clickedCard.gridIndex === 2 || clickedCard.gridIndex === 3) {
                    App.uiState.hasPeeked.add(cardId);
                    App.uiState.peekedCards.add(cardId);
                    UI.render(state);
                    setTimeout(() => { App.uiState.peekedCards.delete(cardId); UI.render(state); }, 2000);
                } else {
                    UI.showToast("You can only peek at the bottom two cards!", "warning");
                }
            } else {
                UI.showToast("You already peeked at this card!", "warning");
            }
            return;
        }
    }
};

window.onload = () => { UI.init(); };
</script>
</body>
</html>
