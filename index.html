        let clickedCard = Engine.getCardById(cardId);
        if (!clickedCard) return;

        let isMyTurn = state.players[state.turnIndex]?.id === App.localId;
        let isHolding = state.activeAbility && state.activeAbility.player === App.localId && state.activeAbility.type.startsWith('holding');

        // Allow discarding drawn card by clicking the discard pile
        if (isHolding && clickedCard.loc === 'discard') {
            Net.sendAction({ type: 'PLAY_HOLDING', action: 'discard' });
            return;
        }

        if (App.uiState.targetingMode) {
            let mode = App.uiState.targetingMode;
            if (mode === 'peeking') return; 

            if (mode === 'swap' && clickedCard.ownerId === App.localId) {
                App.uiState.targetingMode = null; UI.render(state);
                Net.sendAction({ type: 'PLAY_HOLDING', action: 'swap', targetId: cardId });
            }
            else if (mode === 'peek_self' && clickedCard.ownerId === App.localId) {
                App.uiState.targetingMode = 'peeking'; App.uiState.peekedCards.add(cardId); UI.render(state);
                setTimeout(() => {
                    App.uiState.peekedCards.delete(cardId); App.uiState.targetingMode = null; UI.render(App.gameState);
                    Net.sendAction({ type: 'RESOLVE_MAGIC', targetId: cardId });
                }, 2000);
            }
            else if (mode === 'peek_opp' && clickedCard.ownerId !== App.localId && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.targetingMode = 'peeking'; App.uiState.peekedCards.add(cardId); UI.render(state);
                setTimeout(() => {
                    App.uiState.peekedCards.delete(cardId); App.uiState.targetingMode = null; UI.render(App.gameState);
                    Net.sendAction({ type: 'RESOLVE_MAGIC', targetPlayerId: clickedCard.ownerId, targetId: cardId });
                }, 2000);
            }
            else if (mode === 'q_peek' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.peekedCards.add(cardId);
                App.uiState.targetingMode = 'q_swap_1';
                UI.render(state);
                UI.showToast("Card peeked. Select FIRST card to swap, or click Pass.", "info");
            }
            else if (mode === 'q_swap_1' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.selectedCardId = cardId;
                App.uiState.targetingMode = 'q_swap_2';
                UI.render(state);
                UI.showToast("Select SECOND card to swap.", "info");
            }
            else if (mode === 'q_swap_2' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                if (cardId === App.uiState.selectedCardId) return; // Can't swap with itself
                let target1 = App.uiState.selectedCardId;
                App.uiState.targetingMode = null; App.uiState.selectedCardId = null; App.uiState.peekedCards.clear(); UI.render(state);
                Net.sendAction({ type: 'RESOLVE_MAGIC', swapTarget1: target1, swapTarget2: cardId });
            }
            else if (mode === 'blind_swap_1' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.selectedCardId = cardId; App.uiState.targetingMode = 'blind_swap_2'; UI.render(state);
            }
            else if (mode === 'blind_swap_2' && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                if (cardId === App.uiState.selectedCardId) return;
                App.uiState.targetingMode = null; App.uiState.selectedCardId = null; App.uiState.peekedCards.clear(); UI.render(state);
                Net.sendAction({ type: 'RESOLVE_MAGIC', swapTarget1: App.uiState.selectedCardId, swapTarget2: cardId });
            }
            else if (mode === 'force_penalty' && clickedCard.ownerId !== App.localId && clickedCard.loc !== 'deck' && clickedCard.loc !== 'discard') {
                App.uiState.targetingMode = null; UI.render(state);
                Net.sendAction({ type: 'RESOLVE_MAGIC', targetPlayerId: clickedCard.ownerId });
            }
            return;
        }

        if (isHolding && clickedCard.ownerId === App.localId && (clickedCard.loc === 'hand' || clickedCard.loc === 'penalty')) {
            Net.sendAction({ type: 'PLAY_HOLDING', action: 'swap', targetId: cardId });
            return;
        }

        if (!isHolding && (state.phase === 'play' || state.phase === 'orbit') && (clickedCard.loc === 'hand' || clickedCard.loc === 'penalty')) {
            cardEl.style.zIndex = 999;
            Net.sendAction({ type: 'SLAP', targetId: cardId, timestamp: now });
            return;
        }

        if (isMyTurn && !state.activeAbility) {
            if (clickedCard.loc === 'deck') { Net.sendAction({ type: 'DRAW_DECK' }); return; }
            if (clickedCard.loc === 'discard') { Net.sendAction({ type: 'DRAW_DISCARD' }); return; }
        }

        if (state.phase === 'peek' && clickedCard.ownerId === App.localId) {
            if (!App.uiState.hasPeeked.has(cardId)) {
                if (App.uiState.hasPeeked.size < 2) {
                    App.uiState.hasPeeked.add(cardId); App.uiState.peekedCards.add(cardId); UI.render(state);
                    setTimeout(() => { App.uiState.peekedCards.delete(cardId); UI.render(App.gameState); }, 2000);
                } else { UI.showToast("You can only peek at two cards!", "warning"); }
            } else { UI.showToast("You already peeked at this card!", "warning"); }
            return;
        }
    }
};

window.onload = () => { UI.init(); };
</script>
</body>
</html>
